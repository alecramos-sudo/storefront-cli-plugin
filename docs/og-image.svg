<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Terminal window -->
  <rect x="200" y="120" width="800" height="390" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Terminal chrome -->
  <rect x="200" y="120" width="800" height="44" rx="12" fill="#0d1117"/>
  <rect x="200" y="152" width="800" height="12" fill="#0d1117"/>
  <line x1="200" y1="164" x2="1000" y2="164" stroke="#30363d" stroke-width="1"/>
  <circle cx="224" cy="142" r="6" fill="#ff5f57"/>
  <circle cx="244" cy="142" r="6" fill="#febc2e"/>
  <circle cx="264" cy="142" r="6" fill="#28c840"/>
  <text x="600" y="147" text-anchor="middle" font-family="monospace" font-size="13" fill="#7d8590">claude</text>

  <!-- Terminal content -->
  <text x="230" y="200" font-family="monospace" font-size="16" fill="#7d8590">&gt;</text>
  <text x="250" y="200" font-family="monospace" font-size="16" fill="#e6edf3">/shopify-cli-admin:shopify-query</text>
  <text x="230" y="230" font-family="monospace" font-size="16" fill="#e6edf3">  list all products with prices</text>

  <text x="230" y="270" font-family="monospace" font-size="15" fill="#7d8590">  Running query against Admin API...</text>

  <text x="230" y="310" font-family="monospace" font-size="15" fill="#30363d">  ┌─────────────────────┬────────┐</text>
  <text x="230" y="335" font-family="monospace" font-size="15" fill="#7d8590">  │ Classic Tee         │ $29.00 │</text>
  <text x="230" y="360" font-family="monospace" font-size="15" fill="#7d8590">  │ Everyday Hoodie     │ $65.00 │</text>
  <text x="230" y="385" font-family="monospace" font-size="15" fill="#30363d">  └─────────────────────┴────────┘</text>

  <!-- Cursor -->
  <rect x="230" y="405" width="10" height="18" fill="#95BF47" opacity="0.8"/>

  <!-- Title below terminal -->
  <text x="600" y="565" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#e6edf3">storefront-cli-plugin</text>
  <text x="600" y="595" text-anchor="middle" font-family="monospace" font-size="14" fill="#7d8590">Conversational Shopify Admin API access for Claude Code</text>
</svg>
